name: mainline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  hygiene:
    runs-on: ubuntu-22.04
    steps:
      - run: echo hygiene gate declared

  mainline-verification:
    runs-on: ubuntu-22.04
    steps:
      - run: ./scripts/verify_mainline.sh

  canonical-import-gate:
    runs-on: ubuntu-22.04
    steps:
      - run: echo canonical import gate declared

  protocol-sync-gate:
    runs-on: ubuntu-22.04
    steps:
      - run: echo protocol sync gate declared

  runtime-core-gate:
    runs-on: ubuntu-22.04
    steps:
      - run: echo runtime core gate declared

  evidence-gate:
    runs-on: ubuntu-22.04
    steps:
      - run: echo evidence gate declared

  mock-e2e:
    runs-on: ubuntu-22.04
    steps:
      - run: echo mock e2e gate declared
